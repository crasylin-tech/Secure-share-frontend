<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SecureShare — Безопасный обмен файлами</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c10;--surface:#13161d;--surface2:#1a1e28;--surface3:#222736;
  --border:#2a2f3d;--border2:#353b4d;--accent:#4f7cff;--accent2:#7c5cfc;
  --accent-glow:rgba(79,124,255,0.15);--green:#2ecc71;--green-bg:rgba(46,204,113,0.1);
  --red:#e74c3c;--red-bg:rgba(231,76,60,0.1);--amber:#f39c12;--amber-bg:rgba(243,156,18,0.1);
  --text:#eef0f6;--text2:#8b92a8;--text3:#545b72;--radius:12px;--radius-sm:8px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;overflow:hidden}
#root{height:100%;display:flex;flex-direction:column}
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
.auth-wrap::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(79,124,255,0.08) 0%,transparent 70%);top:-100px;left:-100px;pointer-events:none}
.auth-wrap::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(124,92,252,0.07) 0%,transparent 70%);bottom:-100px;right:-100px;pointer-events:none}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 44px;width:460px;max-width:95vw;position:relative;z-index:1}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:36px}
.auth-logo-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center}
.auth-logo-icon svg,.auth-logo-icon svg *{fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.auth-logo-text{font-family:'Syne',sans-serif;font-size:20px;font-weight:700}
.auth-logo-text span{color:var(--accent)}
.auth-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;margin-bottom:6px;letter-spacing:-0.5px}
.auth-subtitle{color:var(--text2);font-size:14px;margin-bottom:32px}
.field{margin-bottom:18px}
.field label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:7px}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--text3)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 22px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all 0.2s;line-height:1}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;width:100%}
.btn-primary:hover:not(:disabled){opacity:0.88;transform:translateY(-1px)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--border2);background:var(--surface3)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(231,76,60,0.25)}
.btn-danger:hover{background:rgba(231,76,60,0.2)}
.btn-sm{padding:7px 14px;font-size:13px}
.btn-icon{width:34px;height:34px;padding:0;border-radius:var(--radius-sm)}
.auth-switch{text-align:center;margin-top:22px;font-size:13px;color:var(--text2)}
.auth-switch a{color:var(--accent);cursor:pointer}
.error-msg{background:var(--red-bg);border:1px solid rgba(231,76,60,0.25);color:var(--red);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-bottom:16px}
.tabs{display:flex;gap:4px;background:var(--surface2);border-radius:var(--radius-sm);padding:4px;margin-bottom:28px}
.tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;border-radius:6px;color:var(--text2);transition:all 0.2s}
.tab.active{background:var(--surface3);color:var(--text);border:1px solid var(--border)}
.app{flex:1;display:flex;overflow:hidden}
.sidebar{width:260px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.sidebar-logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center}
.sidebar-logo-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:700}
.sidebar-org{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;display:flex;align-items:center;justify-content:space-between}
.sidebar-org-name{font-weight:500;color:var(--text);font-size:13px}
.badge-role{font-size:10px;padding:2px 8px;border-radius:99px;background:var(--accent-glow);color:var(--accent);font-weight:500}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 10px}
.nav-section{margin-bottom:6px}
.nav-section-title{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.8px;text-transform:uppercase;padding:8px 10px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;color:var(--text2);transition:all 0.15s;margin-bottom:2px}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-glow);color:var(--accent)}
.nav-item .icon{width:16px;height:16px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:600;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.sidebar-footer{padding:14px 10px;border-top:1px solid var(--border)}
.user-info{display:flex;align-items:center;gap:10px;padding:8px 10px}
.user-name{font-size:13px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-role{font-size:11px;color:var(--text2)}
.logout-btn{margin-left:auto;cursor:pointer;color:var(--text3);transition:color 0.2s;background:none;border:none;display:flex;align-items:center}
.logout-btn:hover{color:var(--red)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.main-header{padding:20px 28px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);flex-shrink:0}
.main-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;letter-spacing:-0.3px}
.main-subtitle{font-size:13px;color:var(--text2);margin-top:1px}
.main-body{flex:1;overflow-y:auto;padding:24px 28px}
.chat-layout{flex:1;display:flex;overflow:hidden}
.chat-list-panel{width:280px;min-width:280px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface);overflow:hidden}
.chat-list-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.chat-list-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:600}
.chat-list-body{flex:1;overflow-y:auto;padding:8px}
.chat-item{padding:12px;border-radius:var(--radius-sm);cursor:pointer;transition:background 0.15s;margin-bottom:2px}
.chat-item:hover{background:var(--surface2)}
.chat-item.active{background:var(--accent-glow);border:1px solid rgba(79,124,255,0.2)}
.chat-item-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-item-meta{font-size:12px;color:var(--text2)}
.chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-header{padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:12px;flex-shrink:0}
.chat-header-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:600}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:12px;padding:40px}
.msg{display:flex;gap:10px}
.msg.own{flex-direction:row-reverse}
.msg-ava{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.msg-bubble{max-width:65%}
.msg-sender{font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:500}
.msg.own .msg-sender{text-align:right}
.file-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:10px;min-width:220px;cursor:pointer;transition:border-color 0.2s;text-decoration:none}
.file-card:hover{border-color:var(--border2)}
.file-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;letter-spacing:-0.5px}
.file-info{flex:1;min-width:0}
.file-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.file-size{font-size:11px;color:var(--text2);margin-top:2px}
.msg-time{font-size:10px;color:var(--text3);margin-top:5px;text-align:right}
.chat-input-area{padding:14px 20px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.chat-input-row{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 8px 8px 16px}
.chat-input-row:focus-within{border-color:var(--accent)}
.chat-input-placeholder{flex:1;font-size:14px;color:var(--text3)}
.file-attach-btn{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:var(--radius-sm);background:var(--accent-glow);color:var(--accent);font-size:13px;font-weight:500;cursor:pointer;border:1px solid rgba(79,124,255,0.2);transition:all 0.2s}
.file-attach-btn:hover{background:rgba(79,124,255,0.25)}
.uploading{opacity:0.6;pointer-events:none}
.no-chat-selected{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:14px}
.org-files-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:20px}
.org-file-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:10px;transition:border-color 0.2s}
.org-file-card:hover{border-color:var(--border2)}
.org-file-actions{display:flex;gap:6px;margin-top:auto}
.upload-drop{border:2px dashed var(--border2);border-radius:var(--radius);padding:36px 24px;text-align:center;cursor:pointer;transition:all 0.2s;color:var(--text2);margin-bottom:20px}
.upload-drop:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.employees-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-top:20px}
.employee-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;display:flex;flex-direction:column;gap:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;width:440px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:24px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
.settings-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;margin-bottom:16px}
.settings-section-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none;padding-bottom:0}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px}
.chip-blue{background:var(--accent-glow);color:var(--accent)}
.chip-green{background:var(--green-bg);color:var(--green)}
.chip-red{background:var(--red-bg);color:var(--red)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:60px 20px;color:var(--text3)}
.empty-state p{font-size:14px;text-align:center;max-width:240px}
.new-chat-btn-row{padding:10px;border-top:1px solid var(--border)}
.alert{padding:12px 16px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.alert-green{background:var(--green-bg);border:1px solid rgba(46,204,113,0.25);color:var(--green)}
.alert-red{background:var(--red-bg);border:1px solid rgba(231,76,60,0.25);color:var(--red)}
.search-box{position:relative;margin-bottom:16px}
.search-box input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px 10px 36px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s}
.search-box input:focus{border-color:var(--accent)}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%)}
.user-list{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;max-height:240px;overflow-y:auto;margin-bottom:8px}
.user-list-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.15s}
.user-list-item:last-child{border-bottom:none}
.user-list-item:hover{background:var(--surface2)}
.user-list-item.selected{background:var(--accent-glow)}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{flex:1;display:flex;align-items:center;justify-content:center}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
input[type=file]{display:none}
svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>

<script>
// ── CONFIG ──────────────────────────────────────────────────
// Замените на URL вашего развёрнутого бэкенда (Railway / Render)
const API_BASE = 'https://secure-share-production-5184.up.railway.app/';
// Для локальной разработки: const API_BASE = 'http://localhost:3000';

// ── API HELPER ──────────────────────────────────────────────
const api = {
  token: localStorage.getItem('ss_token'),
  setToken(t){ this.token = t; if(t) localStorage.setItem('ss_token',t); else localStorage.removeItem('ss_token'); },

  async req(method, path, body, isForm=false){
    const headers = {};
    if(this.token) headers['Authorization'] = 'Bearer ' + this.token;
    if(!isForm) headers['Content-Type'] = 'application/json';
    const res = await fetch(API_BASE + path, {
      method,
      headers,
      body: isForm ? body : (body ? JSON.stringify(body) : undefined),
    });
    if(res.status === 401){ this.setToken(null); location.reload(); }
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.error || 'Ошибка сервера');
    return data;
  },
  get(p){ return this.req('GET',p); },
  post(p,b){ return this.req('POST',p,b); },
  del(p){ return this.req('DELETE',p); },
  upload(p,formData){ return this.req('POST',p,formData,true); },

  fileUrl(uuid){ return `${API_BASE}/api/chats/file/${uuid}?token=${this.token}`; },
};

// ── FILE HELPERS ────────────────────────────────────────────
const FH = {
  icon(name){
    const ext=(name||'').split('.').pop().toLowerCase();
    const m={pdf:{t:'PDF',b:'#e74c3c22',c:'#e74c3c'},doc:{t:'DOC',b:'#2980b922',c:'#2980b9'},docx:{t:'DOC',b:'#2980b922',c:'#2980b9'},xls:{t:'XLS',b:'#27ae6022',c:'#27ae60'},xlsx:{t:'XLS',b:'#27ae6022',c:'#27ae60'},ppt:{t:'PPT',b:'#e67e2222',c:'#e67e22'},pptx:{t:'PPT',b:'#e67e2222',c:'#e67e22'},jpg:{t:'IMG',b:'#9b59b622',c:'#9b59b6'},jpeg:{t:'IMG',b:'#9b59b622',c:'#9b59b6'},png:{t:'IMG',b:'#9b59b622',c:'#9b59b6'},gif:{t:'GIF',b:'#9b59b622',c:'#9b59b6'},webp:{t:'IMG',b:'#9b59b622',c:'#9b59b6'},mp4:{t:'VID',b:'#1abc9c22',c:'#1abc9c'},mp3:{t:'AUD',b:'#1abc9c22',c:'#1abc9c'},wav:{t:'AUD',b:'#1abc9c22',c:'#1abc9c'},zip:{t:'ZIP',b:'#f39c1222',c:'#f39c12'},rar:{t:'RAR',b:'#f39c1222',c:'#f39c12'},txt:{t:'TXT',b:'#95a5a622',c:'#95a5a6'},js:{t:'JS',b:'#f1c40f22',c:'#f1c40f'},ts:{t:'TS',b:'#3498db22',c:'#3498db'},py:{t:'PY',b:'#3498db22',c:'#3498db'},json:{t:'JSON',b:'#2ecc7122',c:'#2ecc71'},html:{t:'HTML',b:'#e74c3c22',c:'#e74c3c'},css:{t:'CSS',b:'#3498db22',c:'#3498db'},csv:{t:'CSV',b:'#27ae6022',c:'#27ae60'}};
    return m[ext]||{t:'FILE',b:'#8b92a822',c:'#8b92a8'};
  },
  size(b){ if(!b)return'—'; if(b<1024)return b+' B'; if(b<1048576)return(b/1024).toFixed(1)+' KB'; return(b/1048576).toFixed(1)+' MB'; },
  date(ts){ return new Date(ts).toLocaleString('ru',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); },
};
</script>

// ── AVATAR ───────────────────────────────────────────────────
const AC=['#4f7cff','#7c5cfc','#2ecc71','#e74c3c','#f39c12','#1abc9c','#e91e63'];
function ac(n){let h=0;for(const c of(n||'?'))h=((h<<5)-h)+c.charCodeAt(0);return AC[Math.abs(h)%AC.length];}
function Av({name,size=34}){
  const i=(name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  return <div style={{width:size,height:size,borderRadius:'50%',background:ac(name),display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*.36,fontWeight:600,color:'#fff',flexShrink:0}}>{i}</div>;
}

// ── AUTH SCREEN ──────────────────────────────────────────────
function AuthScreen({onLogin}){
  const [mode,setMode]=useState('login');
  const [tab,setTab]=useState('org');
  const [f,setF]=useState({orgName:'',orgCode:'',name:'',email:'',password:''});
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const s=k=>e=>setF(p=>({...p,[k]:e.target.value}));

  async function submit(){
    setErr('');setLoading(true);
    try{
      let data;
      if(mode==='register'){
        data=await api.post('/api/auth/register',{orgName:f.orgName,name:f.name,email:f.email,password:f.password});
      } else if(tab==='org'){
        data=await api.post('/api/auth/login',{email:f.email,password:f.password});
      } else {
        data=await api.post('/api/auth/login-employee',{orgCode:f.orgCode,email:f.email,password:f.password});
      }
      api.setToken(data.token);
      onLogin(data);
    }catch(e){setErr(e.message);}
    setLoading(false);
  }

  return(
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-logo">
          <div className="auth-logo-icon"><Ico.Shield/></div>
          <div className="auth-logo-text">Secure<span>Share</span></div>
        </div>
        {mode==='register'?(
          <>
            <div className="auth-title">Регистрация организации</div>
            <div className="auth-subtitle">Создайте аккаунт и пригласите сотрудников</div>
            {err&&<div className="error-msg">{err}</div>}
            <div className="field"><label>Название организации</label><input placeholder="ООО «Пример»" value={f.orgName} onChange={s('orgName')}/></div>
            <div className="field"><label>Ваше имя (администратор)</label><input placeholder="Иван Петров" value={f.name} onChange={s('name')}/></div>
            <div className="field"><label>Email</label><input type="email" placeholder="admin@company.ru" value={f.email} onChange={s('email')}/></div>
            <div className="field"><label>Пароль</label><input type="password" placeholder="Минимум 6 символов" value={f.password} onChange={s('password')}/></div>
            <button className="btn btn-primary" onClick={submit} disabled={loading}>{loading?'Создание...':'Создать организацию'}</button>
            <div className="auth-switch">Уже есть аккаунт? <a onClick={()=>{setMode('login');setErr('');}}>Войти</a></div>
          </>
        ):(
          <>
            <div className="auth-title">Добро пожаловать</div>
            <div className="auth-subtitle">Войдите в свой аккаунт</div>
            <div className="tabs">
              <div className={`tab ${tab==='org'?'active':''}`} onClick={()=>setTab('org')}>Администратор</div>
              <div className={`tab ${tab==='employee'?'active':''}`} onClick={()=>setTab('employee')}>Сотрудник</div>
            </div>
            {err&&<div className="error-msg">{err}</div>}
            {tab==='employee'&&<div className="field"><label>Код организации</label><input placeholder="ORG12ABC" value={f.orgCode} onChange={s('orgCode')}/></div>}
            <div className="field"><label>Email</label><input type="email" placeholder="user@company.ru" value={f.email} onChange={s('email')}/></div>
            <div className="field"><label>Пароль</label><input type="password" placeholder="••••••••" value={f.password} onChange={s('password')}/></div>
            <button className="btn btn-primary" onClick={submit} disabled={loading}>{loading?'Вход...':'Войти'}</button>
            <div className="auth-switch">Нет организации? <a onClick={()=>{setMode('register');setErr('');}}>Зарегистрировать</a></div>
          </>
        )}
      </div>
    </div>
  );
}

// ── CHAT VIEW ────────────────────────────────────────────────
function ChatView({session,isInterOrg}){
  const [chats,setChats]=useState(null);
  const [active,setActive]=useState(null);
  const [messages,setMessages]=useState([]);
  const [showNew,setShowNew]=useState(false);
  const [uploading,setUploading]=useState(false);
  const endRef=useRef(null);

  useEffect(()=>{ loadChats(); },[isInterOrg]);
  useEffect(()=>{ if(active) loadMessages(active.id); },[active]);
  useEffect(()=>{ endRef.current?.scrollIntoView({behavior:'smooth'}); },[messages]);

  async function loadChats(){
    setChats(null);setActive(null);setMessages([]);
    try{ setChats(await api.get(`/api/chats?interOrg=${isInterOrg}`)); }
    catch(e){ setChats([]); }
  }

  async function loadMessages(chatId){
    try{ setMessages(await api.get(`/api/chats/${chatId}/messages`)); }
    catch{ setMessages([]); }
  }

  function getChatName(chat){
    const other=chat.members?.find(m=>m.userId!==session.user.id);
    if(!other) return 'Чат';
    return isInterOrg ? `${other.name} (${other.orgName})` : other.name;
  }

  async function sendFile(file){
    if(!active) return;
    setUploading(true);
    try{
      const fd=new FormData(); fd.append('file',file);
      const msg=await api.upload(`/api/chats/${active.id}/upload`,fd);
      setMessages(prev=>[...prev,msg]);
    }catch(e){alert(e.message);}
    setUploading(false);
  }

  if(chats===null) return <div className="loading-overlay"><div className="spinner"/></div>;

  return(
    <div className="chat-layout">
      <div className="chat-list-panel">
        <div className="chat-list-header">
          <span className="chat-list-title">{isInterOrg?'Межорг. чаты':'Внутренние чаты'}</span>
          <button className="btn btn-secondary btn-sm btn-icon" onClick={()=>setShowNew(true)}><Ico.Plus/></button>
        </div>
        <div className="chat-list-body">
          {chats.length===0
            ?<div className="empty-state" style={{padding:'30px 16px'}}><Ico.Chat/><p>Нет чатов. Создайте первый!</p></div>
            :chats.map(c=>(
              <div key={c.id} className={`chat-item ${active?.id===c.id?'active':''}`} onClick={()=>setActive(c)}>
                <div className="chat-item-name">{getChatName(c)}</div>
                <div className="chat-item-meta">Открыт {FH.date(c.created_at)}</div>
              </div>
            ))
          }
        </div>
        <div className="new-chat-btn-row">
          <button className="btn btn-secondary" style={{width:'100%'}} onClick={()=>setShowNew(true)}><Ico.Plus/> Новый чат</button>
        </div>
      </div>

      {active?(
        <div className="chat-panel">
          <div className="chat-header">
            <Av name={getChatName(active)} size={36}/>
            <div style={{flex:1}}>
              <div className="chat-header-name">{getChatName(active)}</div>
              <div style={{fontSize:12,color:'var(--text2)'}}>
                <span className="chip chip-green" style={{fontSize:10}}><Ico.Shield/> Защищённый канал · JWT + bcrypt</span>
              </div>
            </div>
          </div>
          <div className="chat-messages">
            {messages.length===0
              ?<div className="chat-empty"><Ico.Clip/><span style={{fontSize:14}}>Файлов ещё нет. Отправьте первый!</span></div>
              :messages.map(m=>{
                const isOwn=m.sender_id===session.user.id;
                const fi=FH.icon(m.file_name);
                const dlUrl=`${API_BASE}/api/chats/file/${m.file_uuid}`;
                return(
                  <div key={m.id} className={`msg ${isOwn?'own':''}`}>
                    <div className="msg-ava" style={{background:ac(m.sender_name||'?'),color:'#fff'}}>{(m.sender_name||'?')[0].toUpperCase()}</div>
                    <div className="msg-bubble">
                      <div className="msg-sender">{m.sender_name||'Неизвестный'}</div>
                      <a className="file-card" href={dlUrl} target="_blank" rel="noreferrer"
                        onClick={e=>{e.preventDefault();
                          fetch(dlUrl,{headers:{Authorization:'Bearer '+api.token}})
                            .then(r=>r.blob()).then(b=>{
                              const a=document.createElement('a');
                              a.href=URL.createObjectURL(b);a.download=m.file_name;a.click();
                            });
                        }}>
                        <div className="file-icon" style={{background:fi.b,color:fi.c}}>{fi.t}</div>
                        <div className="file-info">
                          <div className="file-name">{m.file_name}</div>
                          <div className="file-size">{FH.size(m.file_size)}</div>
                        </div>
                        <Ico.Dl/>
                      </a>
                      <div className="msg-time">{FH.date(m.created_at)}</div>
                    </div>
                  </div>
                );
              })
            }
            <div ref={endRef}/>
          </div>
          <div className="chat-input-area">
            <div className={`chat-input-row ${uploading?'uploading':''}`}>
              {uploading
                ?<><div className="spinner"/><span style={{fontSize:13,color:'var(--text2)'}}>Загрузка файла...</span></>
                :<>
                  <span className="chat-input-placeholder">Прикрепите файл для отправки...</span>
                  <label className="file-attach-btn" htmlFor={`cf-${isInterOrg}`}><Ico.Clip/> Прикрепить файл</label>
                  <input type="file" id={`cf-${isInterOrg}`} onChange={e=>{if(e.target.files[0])sendFile(e.target.files[0]);e.target.value='';}}/>
                </>
              }
            </div>
          </div>
        </div>
      ):(
        <div className="no-chat-selected"><Ico.Chat/><span style={{fontSize:14}}>Выберите чат или создайте новый</span></div>
      )}

      {showNew&&<NewChatModal session={session} isInterOrg={isInterOrg}
        onClose={()=>setShowNew(false)}
        onCreated={()=>{setShowNew(false);loadChats();}}/>}
    </div>
  );
}

function NewChatModal({session,isInterOrg,onClose,onCreated}){
  const [q,setQ]=useState('');
  const [users,setUsers]=useState([]);
  const [sel,setSel]=useState(null);
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const timer=useRef(null);

  useEffect(()=>{
    clearTimeout(timer.current);
    timer.current=setTimeout(async()=>{
      try{
        const res=await api.get(`/api/chats/users/search?${isInterOrg?'':'orgId='+session.org.id}&q=${encodeURIComponent(q)}`);
        setUsers(res);
      }catch{}
    },300);
  },[q]);

  async function create(){
    if(!sel) return setErr('Выберите пользователя');
    setLoading(true);
    try{
      await api.post('/api/chats',{targetUserId:sel.id,isInterOrg});
      onCreated();
    }catch(e){setErr(e.message);}
    setLoading(false);
  }

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-title">{isInterOrg?'Чат с другой организацией':'Новый чат'}</div>
        <div className="modal-sub">{isInterOrg?'Найдите сотрудника другой организации':'Выберите сотрудника вашей организации'}</div>
        {err&&<div className="error-msg">{err}</div>}
        <div className="search-box"><Ico.Search/><input placeholder="Поиск..." value={q} onChange={e=>setQ(e.target.value)}/></div>
        <div className="user-list">
          {users.length===0
            ?<div style={{padding:20,textAlign:'center',color:'var(--text3)',fontSize:13}}>Начните вводить имя или email</div>
            :users.map(u=>(
              <div key={u.id} className={`user-list-item ${sel?.id===u.id?'selected':''}`} onClick={()=>setSel(u)}>
                <Av name={u.name} size={30}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:500}}>{u.name}</div>
                  <div style={{fontSize:11,color:'var(--text2)'}}>{isInterOrg?u.org_name:u.email}</div>
                </div>
                {sel?.id===u.id&&<Ico.Check/>}
              </div>
            ))
          }
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Отмена</button>
          <button className="btn btn-primary" style={{width:'auto'}} onClick={create} disabled={loading}>{loading?'Создание...':'Открыть чат'}</button>
        </div>
      </div>
    </div>
  );
}

// ── ORG FILES ────────────────────────────────────────────────
function OrgFiles({session}){
  const [files,setFiles]=useState(null);
  const [uploading,setUploading]=useState(false);
  const isAdmin=session.user.role==='admin';

  useEffect(()=>{ api.get('/api/org-files').then(setFiles).catch(()=>setFiles([])); },[]);

  async function upload(file){
    setUploading(true);
    try{
      const fd=new FormData(); fd.append('file',file);
      const f=await api.upload('/api/org-files',fd);
      setFiles(p=>[f,...p]);
    }catch(e){alert(e.message);}
    setUploading(false);
  }

  async function del(id){
    if(!confirm('Удалить файл?')) return;
    try{ await api.del(`/api/org-files/${id}`); setFiles(p=>p.filter(f=>f.id!==id)); }
    catch(e){ alert(e.message); }
  }

  if(files===null) return <div className="loading-overlay"><div className="spinner"/></div>;

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div className="main-header">
        <div>
          <div className="main-title">Файлы организации</div>
          <div className="main-subtitle">Общие документы · {session.org.name}</div>
        </div>
        {isAdmin&&<label className="btn btn-primary" style={{width:'auto',cursor:'pointer'}} htmlFor="of-input"><Ico.Up/> Загрузить</label>}
        <input type="file" id="of-input" onChange={e=>{if(e.target.files[0])upload(e.target.files[0]);e.target.value='';}}/>
      </div>
      <div className="main-body">
        {!isAdmin&&<div className="alert alert-green"><Ico.Shield/> Файлы публикует администратор. Вы можете их скачивать.</div>}
        {isAdmin&&(
          <label className="upload-drop" htmlFor="of-input">
            {uploading?<><div className="spinner" style={{margin:'0 auto 10px'}}/><p>Загрузка...</p></>:<><Ico.Up/><p>Перетащите файл или нажмите для выбора</p><span>PDF, Word, Excel, изображения и другие форматы · до 50 МБ</span></>}
          </label>
        )}
        {files.length===0
          ?<div className="empty-state"><Ico.File/><p>Файлов организации пока нет</p></div>
          :<div className="org-files-grid">
            {files.map(f=>{
              const fi=FH.icon(f.name);
              const dlUrl=`${API_BASE}/api/chats/file/${f.file_uuid}`;
              return(
                <div key={f.id} className="org-file-card">
                  <div className="file-icon" style={{background:fi.b,color:fi.c,width:44,height:44,borderRadius:10,fontSize:13}}>{fi.t}</div>
                  <div>
                    <div style={{fontSize:13,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</div>
                    <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>{FH.size(f.size)} · {FH.date(f.created_at)}</div>
                    <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>Загрузил: {f.uploader_name||'—'}</div>
                  </div>
                  <div className="org-file-actions">
                    <button className="btn btn-secondary btn-sm" style={{flex:1}} onClick={()=>{
                      fetch(dlUrl,{headers:{Authorization:'Bearer '+api.token}})
                        .then(r=>r.blob()).then(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=f.name;a.click();});
                    }}><Ico.Dl/> Скачать</button>
                    {isAdmin&&<button className="btn btn-danger btn-sm btn-icon" onClick={()=>del(f.id)}><Ico.Trash/></button>}
                  </div>
                </div>
              );
            })}
          </div>
        }
      </div>
    </div>
  );
}

        </div>
      </div>
      {showAdd&&<AddEmpModal session={session} onClose={()=>setShowAdd(false)} onAdded={u=>{setEmps(p=>[...p,u]);setShowAdd(false);}}/>}
    </div>
  );
}

function AddEmpModal({session,onClose,onAdded}){
  const [f,setF]=useState({name:'',email:'',password:''});
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const s=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  async function add(){
    setLoading(true);setErr('');
    try{ const u=await api.post('/api/org/employees',f); onAdded(u); }
    catch(e){ setErr(e.message); }
    setLoading(false);
  }
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-title">Добавить сотрудника</div>
        <div className="modal-sub">Сотрудник сможет войти с кодом организации <b style={{color:'var(--accent)'}}>{session.org.code}</b></div>
        {err&&<div className="error-msg">{err}</div>}
        <div className="field"><label>Полное имя</label><input placeholder="Иван Иванов" value={f.name} onChange={s('name')}/></div>
        <div className="field"><label>Email</label><input type="email" placeholder="ivan@company.ru" value={f.email} onChange={s('email')}/></div>
        <div className="field"><label>Пароль</label><input type="password" placeholder="Временный пароль" value={f.password} onChange={s('password')}/></div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Отмена</button>
          <button className="btn btn-primary" style={{width:'auto'}} onClick={add} disabled={loading}>{loading?'Добавление...':'Добавить'}</button>
        </div>
      </div>
    </div>
  );
}

// ── SETTINGS ────────────────────────────────────────────────
function Settings({session,onDeleteOrg}){
  const isAdmin=session.user.role==='admin';
  const [confirm,setConfirm]=useState(false);
  const [loading,setLoading]=useState(false);

  async function deleteOrg(){
    setLoading(true);
    try{ await api.del('/api/org'); api.setToken(null); onDeleteOrg(); }
    catch(e){ alert(e.message); }
    setLoading(false);
  }

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div className="main-header">
        <div><div className="main-title">Настройки</div><div className="main-subtitle">Управление организацией и аккаунтом</div></div>
      </div>
      <div className="main-body">
        <div className="settings-section">
          <div className="settings-section-title"><Ico.Bld/> Организация</div>
          <div className="settings-row"><span>Название</span><span style={{color:'var(--text2)'}}>{session.org.name}</span></div>
          <div className="settings-row"><span>Код для сотрудников</span><span style={{fontFamily:'monospace',color:'var(--accent)',fontWeight:600}}>{session.org.code}</span></div>
        </div>
        <div className="settings-section">
          <div className="settings-section-title"><Ico.Users/> Профиль</div>
          <div className="settings-row"><span>Имя</span><span style={{color:'var(--text2)'}}>{session.user.name}</span></div>
          <div className="settings-row"><span>Email</span><span style={{color:'var(--text2)'}}>{session.user.email}</span></div>
          <div className="settings-row"><span>Роль</span><span className={`chip ${session.user.role==='admin'?'chip-blue':'chip-green'}`}>{session.user.role==='admin'?'Администратор':'Сотрудник'}</span></div>
        </div>
        <div className="settings-section">
          <div className="settings-section-title"><Ico.Shield/> Безопасность</div>
          <div className="settings-row"><span>Хэширование паролей</span><span className="chip chip-green">bcrypt (cost 10)</span></div>
          <div className="settings-row"><span>Аутентификация</span><span className="chip chip-blue">JWT · 7 дней</span></div>
          <div className="settings-row"><span>Хранение файлов</span><span className="chip chip-blue">UUID-имена · PostgreSQL</span></div>
          <div className="settings-row"><span>Контроль доступа</span><span className="chip chip-green">RBAC (admin / employee)</span></div>
          <div className="settings-row"><span>Транспорт</span><span className="chip chip-green">HTTPS + CORS</span></div>
        </div>
        {isAdmin&&(
          <div className="settings-section" style={{borderColor:'rgba(231,76,60,0.3)'}}>
            <div className="settings-section-title" style={{color:'var(--red)'}}><Ico.Trash/> Опасная зона</div>
            <p style={{fontSize:13,color:'var(--text2)',marginBottom:14}}>Удаление организации безвозвратно удалит всех сотрудников, внутренние чаты и общие файлы. Файлы в межорг. чатах останутся у другой стороны.</p>
            {!confirm
              ?<button className="btn btn-danger" onClick={()=>setConfirm(true)}>Удалить организацию</button>
              :<div style={{display:'flex',gap:10,alignItems:'center'}}>
                <span style={{fontSize:13,color:'var(--red)'}}>Вы уверены? Необратимо.</span>
                <button className="btn btn-danger" onClick={deleteOrg} disabled={loading}>{loading?'Удаление...':'Да, удалить'}</button>
                <button className="btn btn-secondary btn-sm" onClick={()=>setConfirm(false)}>Отмена</button>
              </div>
            }
          </div>
        )}
      </div>
    </div>
  );
}

// ── APP ROOT ─────────────────────────────────────────────────
function App(){
  const [session,setSession]=useState(()=>{
    // Восстанавливаем сессию из localStorage
    const token=localStorage.getItem('ss_token');
    const raw=localStorage.getItem('ss_session');
    if(!token||!raw) return null;
    try{ return JSON.parse(raw); }catch{ return null; }
  });
  const [section,setSection]=useState('chats');

  function onLogin(data){
    const s={user:data.user,org:data.org};
    localStorage.setItem('ss_session',JSON.stringify(s));
    setSession(s);setSection('chats');
  }
  function logout(){ api.setToken(null); localStorage.removeItem('ss_session'); setSession(null); }
  function onDeleteOrg(){ localStorage.removeItem('ss_session'); setSession(null); }

  if(!session) return <AuthScreen onLogin={onLogin}/>;

  const {user,org}=session;
  const isAdmin=user.role==='admin';

  return(
    <div className="app">
      <div className="sidebar">
        <div className="sidebar-header">
          <div className="sidebar-logo">
            <div className="sidebar-logo-icon"><Ico.Shield/></div>
            <span className="sidebar-logo-name">SecureShare</span>
          </div>
          <div className="sidebar-org">
            <div>
              <div className="sidebar-org-name">{org.name}</div>
              <div style={{fontSize:11,color:'var(--text3)',fontFamily:'monospace'}}>{org.code}</div>
            </div>
            <span className="badge-role">{isAdmin?'Admin':'User'}</span>
          </div>
        </div>
        <nav className="sidebar-nav">
          <div className="nav-section">
            <div className="nav-section-title">Сообщения</div>
            {[
              {id:'chats',    label:'Внутренние чаты', icon:<Ico.Chat/>},
              {id:'interorg', label:'Межорг. чаты',     icon:<Ico.Globe/>},
            ].map(({id,label,icon})=>(
              <div key={id} className={`nav-item ${section===id?'active':''}`} onClick={()=>setSection(id)}>
                <span className="icon">{icon}</span> {label}
              </div>
            ))}
          </div>
          <div className="nav-section">
            <div className="nav-section-title">Документы</div>
            <div className={`nav-item ${section==='orgfiles'?'active':''}`} onClick={()=>setSection('orgfiles')}>
              <span className="icon"><Ico.File/></span> Файлы организации
            </div>
          </div>
          <div className="nav-section">
            <div className="nav-section-title">Управление</div>
            {[
              {id:'employees', label:'Сотрудники',  icon:<Ico.Users/>},
              {id:'settings',  label:'Настройки',   icon:<Ico.Cog/>},
            ].map(({id,label,icon})=>(
              <div key={id} className={`nav-item ${section===id?'active':''}`} onClick={()=>setSection(id)}>
                <span className="icon">{icon}</span> {label}
              </div>
            ))}
          </div>
        </nav>
        <div className="sidebar-footer">
          <div className="user-info">
            <Av name={user.name} size={34}/>
            <div style={{flex:1,minWidth:0}}>
              <div className="user-name">{user.name}</div>
              <div className="user-role">{isAdmin?'Администратор':'Сотрудник'}</div>
            </div>
            <button className="logout-btn" onClick={logout} title="Выйти"><Ico.Out/></button>
          </div>
        </div>
      </div>

      <div className="main">
        {section==='chats'    &&<ChatView    key="in"  session={session} isInterOrg={false}/>}
        {section==='interorg' &&<ChatView    key="io"  session={session} isInterOrg={true}/>}
        {section==='orgfiles' &&<OrgFiles              session={session}/>}
        {section==='employees'&&<Employees             session={session}/>}
        {section==='settings' &&<Settings              session={session} onDeleteOrg={onDeleteOrg}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
